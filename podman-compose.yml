# Fully isolated from newsautomation:
#  - own project name (alertkonsumencki) + container_name + image
#  - default bridge network, NO host networking, NO published ports
#  - own ./session volume (Telethon session + persisted state.json)
# newsautomation's podman-compose only ever touches its own 'newsautomation' project,
# so running/redeploying it will not recreate or remove this container.
version: '3.8'

services:
  bot:
    container_name: alertkonsumencki_bot
    image: localhost/alertkonsumencki_bot:latest
    build:
      context: .
      dockerfile: Containerfile
    env_file: .env
    environment:
      # keep state.json inside the persisted session volume so it survives redeploys
      - STATE_FILE=/app/session/state.json
      - QUEUE_DIR=/app/queue
    volumes:
      - ./session:/app/session
      - ./queue:/app/queue   # handoff od crawlera
    networks:
      - default
      - deploy_net   # do wołania deploy-webhook (/redeploy, /restart, /rebuild)
    restart: unless-stopped

  # Mini-serwis: cyklicznie sprawdza ostrzeżenia GIS. Współdzieli obraz z botem,
  # ale to osobny kontener — działa równolegle i niezależnie.
  crawler:
    container_name: alertkonsumencki_crawler
    image: localhost/alertkonsumencki_bot:latest
    build:
      context: .
      dockerfile: Containerfile
    command: ["python", "-m", "crawler"]
    env_file: .env
    environment:
      - CRAWLER_INTERVAL=${CRAWLER_INTERVAL:-600}
      - CRAWLER_OUTPUT_DIR=/app/gis_alerts
      - CRAWLER_STATE_FILE=/app/gis_alerts/crawler_state.json
      - QUEUE_DIR=/app/queue
    volumes:
      - ./gis_alerts:/app/gis_alerts
      - ./queue:/app/queue   # handoff do bota
    networks:
      - default
    restart: unless-stopped

networks:
  default: {}
  # Współdzielona z deploy-webhook (~/Documents/deploy-webhook) — musi istnieć
  # PRZED odpaleniem: podman network create deploy_net
  deploy_net:
    external: true
